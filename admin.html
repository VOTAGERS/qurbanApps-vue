<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/images/llmqurban.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>%VITE_APP_NAME%</title>
    <!-- [Google Font] Family -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" id="main-font-link" />
    
    <!-- [Tabler Icons] -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <!-- [Feather Icons] -->
    <link rel="stylesheet" href="/assets/fonts/feather.css" />
    <!-- [Font Awesome Icons] -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- [Material Icons] -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />

    <!-- [Template CSS Files] -->
    <link rel="stylesheet" href="/assets/css/style.css" id="main-style-link" />
    <link rel="stylesheet" href="/assets/css/style-preset.css" />
  </head>
  <body>
    <div id="app"></div>

    <!-- Required Js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/plugins/simplebar.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    
    <script src="/assets/js/fonts/custom-font.js"></script>
    <script src="/assets/js/script.js"></script>
    <script src="/assets/js/theme.js"></script>

    <script>
      // Initialize Admin Layout
      window.addEventListener('DOMContentLoaded', () => {
        if(typeof layout_change === 'function') layout_change('light');
        if(typeof font_change === 'function') font_change('Roboto');
        if(typeof feather !== 'undefined') feather.replace();
      });
    </script>

    <script type="module" src="/src/main-admin.ts"></script>
  </body>
</html>
